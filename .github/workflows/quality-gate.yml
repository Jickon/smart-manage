name: Quality Gate

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile backend
        working-directory: smart-manage-api
        run: mvn --batch-mode --no-transfer-progress compile

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: smart-manage-web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: smart-manage-web
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: smart-manage-web
        run: pnpm lint
      - name: Check formatting
        working-directory: smart-manage-web
        run: pnpm format:check
      - name: Build
        working-directory: smart-manage-web
        run: pnpm build

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify migrations from an empty database
        shell: pwsh
        run: ./db/verify-baseline.ps1 -PsqlPath /usr/bin/psql
