server:
  port: 8080

spring:
  arthas:
    enabled: false
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: ${SMART_MANAGE_DB_URL:jdbc:postgresql://localhost:5432/smart_manage}
    username: ${SMART_MANAGE_DB_USERNAME:postgres}
    # 仅用于本地开发的公开默认凭据；生产环境由 application-prod.yml 强制从环境变量注入。
    password: ${SMART_MANAGE_DB_PASSWORD:postgres}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 100
      max-wait: 30000
      test-while-idle: true
      test-on-borrow: true
      test-on-return: true
      validation-query: SELECT 1
      validation-query-timeout: 3000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      remove-abandoned: true
      remove-abandoned-timeout-millis: 300
      keep-alive: true
      filters: stat
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: /druid/*,*.js,*.gif,*.jpg,*.png,*.css,*.ico
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: ${SMART_MANAGE_DRUID_USERNAME:druid}
        login-password: ${SMART_MANAGE_DRUID_PASSWORD:druid}
        allow: 127.0.0.1
  data:
    redis:
      host: ${SMART_MANAGE_REDIS_HOST:127.0.0.1}
      port: ${SMART_MANAGE_REDIS_PORT:6379}
      password: ${SMART_MANAGE_REDIS_PASSWORD:redis123}
      database: ${SMART_MANAGE_REDIS_DATABASE:1}
      timeout: 1000ms
      jedis:
        pool:
          max-active: 100
          max-idle: 10
          min-idle: 2

jetcache:
  remote:
    default:
      type: redis
      keyConvertor: jackson
      host: ${SMART_MANAGE_REDIS_HOST:127.0.0.1}
      port: ${SMART_MANAGE_REDIS_PORT:6379}
      password: ${SMART_MANAGE_REDIS_PASSWORD:redis123}
      database: ${SMART_MANAGE_REDIS_DATABASE:1}
      timeout: 1000
      poolConfig:
        maxTotal: 100
        maxIdle: 10
        minIdle: 2

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

scalar:
  enabled: true
  path: /scalar

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always

arthas:
  http-port: 8563
  telnet-port: 3658
  ip: 127.0.0.1
  session-timeout: 1800

smart-manage:
  framework:
    cors:
      allowed-origins:
        - http://localhost:*
  system:
    upload:
      dir: ${SMART_MANAGE_UPLOAD_DIR:E:/upload/}
  sm2:
    js:
      # 开发密钥与 login.html 的公开开发公钥配套，禁止在生产环境复用。
      private-key: ${SMART_MANAGE_SM2_PRIVATE_KEY:00dc349799de9b5a3beef8d3d77aa7e3655c5542a10c395cc86670580b6250dfeb}
      public-key: ${SMART_MANAGE_SM2_PUBLIC_KEY:0405102042204d15e802522ea09eb609358e4c72295e0ca44727eef75faac9afb3eeaa3e9df5af87e205e6ce5cb351e4fb30c37602f32aad969d2b222f05f8fa99}
