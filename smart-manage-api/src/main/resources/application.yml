spring:
  application:
    name: smart-manage
  profiles:
    # 开源项目默认使用开发环境；部署时通过 SPRING_PROFILES_ACTIVE 显式覆盖为 prod。
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 2592000
          cache-public: true
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 500KB
      resolve-lazily: false
  task:
    execution:
      pool:
        core-size: 4
        max-size: 4
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: async-task-
    scheduling:
      pool:
        size: 4
      thread-name-prefix: scheduling-task-
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: SmartManageScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.threadPool.threadCount: 10

server:
  servlet:
    context-path: /smart-manage-api
  compression:
    enabled: true
  tomcat:
    max-connections: 100
    threads:
      max: 200
      min-spare: 20
    accept-count: 10
    connection-timeout: 20000

logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
  file:
    name: logs/smart-manage.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 5GB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  decodeFilterAllowPatterns:
    - sm.
  local:
    default:
      type: caffeine
      keyConvertor: jackson
      limit: 10000
      expireAfterWriteInMillis: 1800000

sa-token:
  token-name: smtoken
  is-read-cookie: false
  timeout: 86400
  active-timeout: 18000
  is-concurrent: true
  is-share: false
  token-style: random-64
  is-log: true

smart-manage:
  framework:
    no-need-login: /sys/base/login,/sys/base/captcha
  org:
    default-id: 1
  security:
    argon2:
      iterations: 2
      memory: 65536
      parallelism: 1
  captcha:
    width: 160
    height: 50
    length: 4
    expire: 300
  system:
    log:
      core-pool-size: 10
      max-pool-size: 20
      queue-capacity: 1000
      keep-alive-seconds: 60
      thread-name-prefix: biz-log-
